<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05070d" />
    <title>Atomic Genesis</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <canvas id="universe" aria-label="Particle universe simulation"></canvas>
    <div id="bh-ring"></div>

    <aside class="panel">
      <select id="preset-select">
        <option value="">— preset —</option>
      </select>
      <div id="controls" class="controls"></div>

      <div class="actions">
        <button id="trigger" class="trigger"><span>Start / retrigger</span></button>
        <button id="pause" class="icon-button" aria-label="Pause simulation">Ⅱ</button>
        <button id="rotate" class="icon-button" aria-label="Auto-rotate camera">↻</button>
      </div>

      <div class="stats">
        <span id="stat-fps">-- fps</span>
        <span id="stat-time">0:00</span>
      </div>
      <p class="hint">Hold canvas to spawn black hole</p>
    </aside>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
